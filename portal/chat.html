<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Insider - Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Gilroy ExtraBold';
            src: url('../Gilroy%20ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --accent: #f0c832;
            --accent-light: #f7d954;
            --accent-dim: rgba(240, 200, 50, 0.15);
            --accent-glow: rgba(240, 200, 50, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2a2a;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== Background Animation ========== */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dot-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(240, 200, 50, 0.18) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px; right: -100px;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(240, 200, 50, 0.2) 0%, transparent 70%);
            bottom: -80px; left: -80px;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        /* ========== Page Layout ========== */
        .support-wrapper {
            position: relative;
            z-index: 2;
            padding-left: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== TICKET LIST VIEW ========== */
        .ticket-list-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .ticket-list-header {
            padding: 28px 32px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .ticket-list-header h1 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 22px;
            color: var(--text-primary);
        }

        .ticket-list-header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .btn-new-ticket {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-new-ticket:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(240, 200, 50, 0.25);
        }

        .btn-new-ticket svg {
            width: 16px;
            height: 16px;
        }

        .btn-new-ticket.hidden {
            display: none;
        }

        /* Ticket Cards Scroll Area */
        .ticket-cards-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .ticket-cards-area::-webkit-scrollbar {
            width: 5px;
        }

        .ticket-cards-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .ticket-cards-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Section Labels */
        .ticket-section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ticket-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .ticket-section-label.past {
            margin-top: 28px;
        }

        /* Ticket Card */
        .ticket-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .ticket-card:hover {
            border-color: rgba(240, 200, 50, 0.25);
            background: rgba(20, 20, 20, 0.9);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .ticket-card.active {
            border-color: rgba(240, 200, 50, 0.3);
        }

        .ticket-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .ticket-card-id {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .ticket-card-id .ticket-title {
            color: var(--text-secondary);
            font-weight: 600;
            margin-left: 6px;
        }

        .ticket-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ticket-status.open {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .ticket-status.open .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .ticket-status.resolved {
            background: rgba(107, 114, 128, 0.1);
            color: var(--text-muted);
            border: 1px solid rgba(107, 114, 128, 0.2);
        }

        .ticket-card-preview {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .ticket-card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ticket-card-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .ticket-card-action {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .ticket-card:hover .ticket-card-action {
            opacity: 1;
        }

        .ticket-card-action svg {
            width: 14px;
            height: 14px;
        }

        /* Empty state */
        .tickets-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
        }

        .tickets-empty .empty-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(240, 200, 50, 0.06);
            border: 1px solid rgba(240, 200, 50, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tickets-empty .empty-icon svg {
            width: 32px;
            height: 32px;
            color: var(--accent);
            opacity: 0.6;
        }

        .tickets-empty h3 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .tickets-empty p {
            font-size: 14px;
            max-width: 360px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* ========== NEW TICKET MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            padding: 28px;
            transform: translateY(16px) scale(0.97);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.show .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .modal .modal-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .modal-field input,
        .modal-field textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .modal-field input:focus,
        .modal-field textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240, 200, 50, 0.08);
        }

        .modal-field input::placeholder,
        .modal-field textarea::placeholder {
            color: var(--text-muted);
        }

        .modal-field textarea {
            resize: none;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn-modal-cancel {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-modal-cancel:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .btn-modal-submit {
            padding: 10px 24px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-modal-submit:hover:not(:disabled) {
            background: var(--accent-light);
        }

        .btn-modal-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ========== CHAT VIEW (DRILL-IN) ========== */
        .chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .chat-view.visible {
            display: flex;
        }

        .chat-header {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
        }

        .btn-back svg {
            width: 16px;
            height: 16px;
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info h2 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-info h2 .ticket-num {
            font-family: 'Manrope', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .chat-header-info .chat-header-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        /* Resolved Banner */
        .resolved-banner {
            padding: 10px 32px;
            background: rgba(107, 114, 128, 0.08);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .resolved-banner svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ========== Messages Area ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Date Separator */
        .msg-date-separator {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .msg-date-separator::before,
        .msg-date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .msg-date-separator span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Message Rows */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 72%;
        }

        .msg-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.them {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-row.me .msg-avatar {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(240, 200, 50, 0.2);
        }

        .msg-row.them .msg-avatar {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .msg-row.me .msg-content {
            align-items: flex-end;
        }

        .msg-row.them .msg-content {
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.me .msg-bubble {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .msg-row.them .msg-bubble {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-sender {
            font-weight: 600;
        }

        /* ========== Chat Input Area ========== */
        .chat-input-area {
            padding: 16px 32px 24px;
            border-top: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .chat-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            transition: border-color 0.2s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240, 200, 50, 0.08);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
        }

        /* ========== Chat Empty State ========== */
        .chat-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .chat-empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .chat-empty-state h3 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .chat-empty-state p {
            font-size: 14px;
            max-width: 360px;
            line-height: 1.6;
        }

        /* ========== Loading Spinner ========== */
        .loading-spinner {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        /* ========== Mobile ========== */
        @media (max-width: 768px) {
            .support-wrapper {
                padding-left: 0;
            }

            .ticket-list-header {
                padding: 20px;
                flex-direction: column;
                gap: 16px;
            }

            .btn-new-ticket {
                width: 100%;
                justify-content: center;
            }

            .ticket-cards-area {
                padding: 16px 20px;
            }

            .chat-header {
                padding: 12px 16px;
            }

            .chat-messages {
                padding: 16px 20px;
            }

            .chat-input-area {
                padding: 12px 20px 20px;
            }

            .msg-row {
                max-width: 85%;
            }

            .modal {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="dot-pattern"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Wrapper -->
    <div class="support-wrapper" id="supportWrapper" style="display: none;">

        <!-- ========== TICKET LIST VIEW ========== -->
        <div class="ticket-list-view" id="ticketListView">
            <div class="ticket-list-header">
                <div>
                    <h1>Support</h1>
                    <p>Get help from our team</p>
                </div>
                <button class="btn-new-ticket" id="btnNewTicket" onclick="openNewTicketModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    Open a Ticket
                </button>
            </div>
            <div class="ticket-cards-area" id="ticketCardsArea">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- ========== CHAT VIEW (DRILL-IN) ========== -->
        <div class="chat-view" id="chatView">
            <div class="chat-header">
                <button class="btn-back" onclick="backToTicketList()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                    </svg>
                    Tickets
                </button>
                <div class="chat-header-info">
                    <h2 id="chatHeaderTitle">
                        <span class="ticket-num" id="chatTicketNum">#1001</span>
                        <span id="chatTicketTitle">Support Request</span>
                    </h2>
                    <div class="chat-header-subtitle" id="chatHeaderSubtitle">Chatting with the Profit Insider team</div>
                </div>
                <div id="chatHeaderStatus"></div>
            </div>

            <!-- Resolved banner (hidden by default) -->
            <div class="resolved-banner" id="resolvedBanner" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>This ticket has been resolved. Send a message to reopen it.</span>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>

            <!-- Input (hidden when resolved) -->
            <div class="chat-input-area" id="chatInputArea">
                <div class="chat-input-wrapper">
                    <textarea
                        class="chat-input"
                        id="chatInput"
                        placeholder="Type a message..."
                        rows="1"
                        onkeydown="handleInputKeydown(event)"
                        oninput="autoResizeInput(this); toggleSendBtn();"
                    ></textarea>
                    <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Ticket Modal -->
    <div class="modal-overlay" id="newTicketModal">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Open a New Ticket</h2>
            <p class="modal-subtitle">Describe your issue and our team will get back to you.</p>

            <div class="modal-field">
                <label for="ticketSubject">Subject</label>
                <input type="text" id="ticketSubject" placeholder="e.g. Account setup help" maxlength="120">
            </div>

            <div class="modal-field">
                <label for="ticketMessage">Message</label>
                <textarea id="ticketMessage" placeholder="Describe what you need help with..."></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeNewTicketModal()">Cancel</button>
                <button class="btn-modal-submit" id="btnSubmitTicket" onclick="submitNewTicket()" disabled>Submit Ticket</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="../activity-tracker.js"></script>
    <script>
        // ============================================================
        // STATE
        // ============================================================
        let currentUser = null;
        let currentProfile = null;
        let autoLogoutTimer = null;

        let currentView = 'list'; // 'list' | 'chat'
        let allTickets = [];
        let selectedTicketId = null;
        let selectedTicketStatus = 'open';

        let messagesSubscription = null;
        let pollingInterval = null;
        let lastMessageTimestamp = null;

        // ============================================================
        // AUTO-LOGOUT
        // ============================================================
        function resetAutoLogout() {
            if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
            autoLogoutTimer = setTimeout(() => {
                window.signOut();
            }, 30 * 60 * 1000);
        }

        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, resetAutoLogout, { passive: true });
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        (async function init() {
            try {
                const user = await window.getCurrentUser();
                if (!user) {
                    window.location.href = '/auth';
                    return;
                }
                currentUser = user;

                const profile = await window.getUserProfile(user.id);
                if (!profile) {
                    window.location.href = '/auth';
                    return;
                }
                currentProfile = profile;

                const userStatus = (profile.status || 'onboarding').toLowerCase();
                if (!['member', 'verified_member', 'active'].includes(userStatus)) {
                    window.location.href = '/onboarding';
                    return;
                }

                window.injectClientSidebar('messages', '../logo.png');
                resetAutoLogout();

                if (typeof window.trackActivity === 'function') {
                    window.trackActivity('page_view', '/portal/chat');
                }

                document.getElementById('supportWrapper').style.display = '';

                // Load tickets
                await loadTickets();

            } catch (err) {
                console.error('Init error:', err);
                if (!currentUser) {
                    window.location.href = '/auth';
                }
            }
        })();

        // ============================================================
        // LOAD TICKETS
        // ============================================================
        async function loadTickets() {
            const area = document.getElementById('ticketCardsArea');
            area.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('chat_conversations')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allTickets = data || [];
                renderTicketList();

            } catch (err) {
                console.error('Error loading tickets:', err);
                area.innerHTML = `
                    <div class="tickets-empty">
                        <div class="empty-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
                            </svg>
                        </div>
                        <h3>Error Loading Tickets</h3>
                        <p>Please try refreshing the page.</p>
                    </div>`;
            }
        }

        // ============================================================
        // RENDER TICKET LIST
        // ============================================================
        function renderTicketList() {
            const area = document.getElementById('ticketCardsArea');
            const btnNew = document.getElementById('btnNewTicket');

            // Check if there's an open ticket
            const hasOpenTicket = allTickets.some(t => (t.status || 'open') === 'open');
            btnNew.classList.toggle('hidden', hasOpenTicket);

            if (allTickets.length === 0) {
                area.innerHTML = `
                    <div class="tickets-empty">
                        <div class="empty-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 010 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 010-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375z" />
                            </svg>
                        </div>
                        <h3>No Tickets Yet</h3>
                        <p>Need help? Open a support ticket and our team will assist you as soon as possible.</p>
                        <button class="btn-new-ticket" onclick="openNewTicketModal()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                            </svg>
                            Open a Ticket
                        </button>
                    </div>`;
                return;
            }

            const openTickets = allTickets.filter(t => (t.status || 'open') === 'open');
            const resolvedTickets = allTickets.filter(t => (t.status || 'open') !== 'open');

            let html = '';

            // Active tickets
            if (openTickets.length > 0) {
                html += '<div class="ticket-section-label">Active Ticket</div>';
                openTickets.forEach(ticket => {
                    html += renderTicketCard(ticket, true);
                });
            }

            // Past tickets
            if (resolvedTickets.length > 0) {
                html += `<div class="ticket-section-label ${openTickets.length > 0 ? 'past' : ''}">Past Tickets</div>`;
                resolvedTickets.forEach(ticket => {
                    html += renderTicketCard(ticket, false);
                });
            }

            area.innerHTML = html;
        }

        function renderTicketCard(ticket, isActive) {
            const status = ticket.status || 'open';
            const isOpen = status === 'open';
            const ticketNum = ticket.ticket_number || '—';
            const title = escapeHtml(ticket.title || 'Support Request');
            const preview = escapeHtml(ticket.last_message_preview || 'No messages yet');
            const actionLabel = isOpen ? 'Continue Chat' : 'View';

            let dateStr;
            if (isOpen) {
                const lastActivity = ticket.last_message_at || ticket.created_at;
                dateStr = 'Last activity: ' + formatRelativeTime(lastActivity);
            } else {
                const resolved = ticket.resolved_at || ticket.updated_at || ticket.created_at;
                dateStr = 'Resolved ' + formatDate(resolved);
            }

            return `
                <div class="ticket-card ${isActive ? 'active' : ''}" onclick="openTicketView('${ticket.id}')">
                    <div class="ticket-card-top">
                        <div class="ticket-card-id">
                            #${ticketNum}<span class="ticket-title">${title}</span>
                        </div>
                        <span class="ticket-status ${isOpen ? 'open' : 'resolved'}">
                            ${isOpen ? '<span class="status-dot"></span>' : ''}
                            ${isOpen ? 'Open' : 'Resolved'}
                        </span>
                    </div>
                    <div class="ticket-card-preview">${preview}</div>
                    <div class="ticket-card-bottom">
                        <span class="ticket-card-date">${dateStr}</span>
                        <span class="ticket-card-action">
                            ${actionLabel}
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                            </svg>
                        </span>
                    </div>
                </div>`;
        }

        // ============================================================
        // OPEN TICKET VIEW (DRILL-IN)
        // ============================================================
        async function openTicketView(ticketId) {
            const ticket = allTickets.find(t => t.id === ticketId);
            if (!ticket) return;

            selectedTicketId = ticketId;
            selectedTicketStatus = ticket.status || 'open';
            currentView = 'chat';
            lastMessageTimestamp = null;

            // Update header
            document.getElementById('chatTicketNum').textContent = '#' + (ticket.ticket_number || '—');
            document.getElementById('chatTicketTitle').textContent = ticket.title || 'Support Request';

            // Status badge in header
            const isOpen = selectedTicketStatus === 'open';
            document.getElementById('chatHeaderStatus').innerHTML = `
                <span class="ticket-status ${isOpen ? 'open' : 'resolved'}">
                    ${isOpen ? '<span class="status-dot"></span>' : ''}
                    ${isOpen ? 'Open' : 'Resolved'}
                </span>`;

            // Resolved banner + input
            document.getElementById('resolvedBanner').style.display = isOpen ? 'none' : '';
            document.getElementById('chatInputArea').style.display = isOpen ? '' : 'none';

            // Switch views
            document.getElementById('ticketListView').style.display = 'none';
            document.getElementById('chatView').classList.add('visible');

            // Mark as read
            if (ticket.user_unread_count > 0) {
                window.supabaseClient
                    .from('chat_conversations')
                    .update({ user_unread_count: 0 })
                    .eq('id', ticketId)
                    .then(({ error }) => { if (error) console.warn('Mark read error:', error.message); });
            }

            // Load messages
            await loadMessages();

            // Subscribe to realtime + polling
            subscribeToMessages();
            startPolling();
        }

        // ============================================================
        // BACK TO TICKET LIST
        // ============================================================
        function backToTicketList() {
            currentView = 'list';
            selectedTicketId = null;
            lastMessageTimestamp = null;

            // Cleanup subscriptions
            if (messagesSubscription) {
                window.supabaseClient.removeChannel(messagesSubscription);
                messagesSubscription = null;
            }
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            // Switch views
            document.getElementById('chatView').classList.remove('visible');
            document.getElementById('ticketListView').style.display = '';

            // Refresh ticket list to get latest data
            loadTickets();
        }

        // ============================================================
        // NEW TICKET MODAL
        // ============================================================
        function openNewTicketModal() {
            document.getElementById('ticketSubject').value = '';
            document.getElementById('ticketMessage').value = '';
            document.getElementById('btnSubmitTicket').disabled = true;
            document.getElementById('newTicketModal').classList.add('show');

            // Focus subject input
            setTimeout(() => document.getElementById('ticketSubject').focus(), 200);
        }

        function closeNewTicketModal() {
            document.getElementById('newTicketModal').classList.remove('show');
        }

        // Enable/disable submit button
        document.getElementById('ticketSubject').addEventListener('input', validateTicketForm);
        document.getElementById('ticketMessage').addEventListener('input', validateTicketForm);

        function validateTicketForm() {
            const subject = document.getElementById('ticketSubject').value.trim();
            const message = document.getElementById('ticketMessage').value.trim();
            document.getElementById('btnSubmitTicket').disabled = !subject || !message;
        }

        // Close modal on overlay click
        document.getElementById('newTicketModal').addEventListener('click', function(e) {
            if (e.target === this) closeNewTicketModal();
        });

        // Close modal on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('newTicketModal').classList.contains('show')) {
                closeNewTicketModal();
            }
        });

        // ============================================================
        // SUBMIT NEW TICKET
        // ============================================================
        async function submitNewTicket() {
            const subjectEl = document.getElementById('ticketSubject');
            const messageEl = document.getElementById('ticketMessage');
            const submitBtn = document.getElementById('btnSubmitTicket');

            const subject = subjectEl.value.trim();
            const messageText = messageEl.value.trim();

            if (!subject || !messageText) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            try {
                // Create conversation
                const { data: newConv, error: convError } = await window.supabaseClient
                    .from('chat_conversations')
                    .insert({
                        user_id: currentUser.id,
                        status: 'open',
                        title: subject,
                        last_message_at: new Date().toISOString(),
                        last_message_preview: messageText.substring(0, 100),
                        admin_unread_count: 1
                    })
                    .select()
                    .single();

                if (convError) throw convError;

                // Insert first message
                const { error: msgError } = await window.supabaseClient
                    .from('chat_messages')
                    .insert({
                        conversation_id: newConv.id,
                        sender_id: currentUser.id,
                        sender_type: 'customer',
                        content: messageText,
                        message: messageText
                    });

                if (msgError) throw msgError;

                // Close modal
                closeNewTicketModal();

                // Add to local tickets list and drill in
                allTickets.unshift(newConv);
                await openTicketView(newConv.id);

                showToast('Ticket created successfully!', 'success');

            } catch (err) {
                console.error('Error creating ticket:', err);
                showToast('Failed to create ticket. Please try again.', 'error');
                submitBtn.disabled = false;
            } finally {
                submitBtn.textContent = 'Submit Ticket';
            }
        }

        // ============================================================
        // LOAD MESSAGES
        // ============================================================
        async function loadMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('chat_messages')
                    .select(`
                        *,
                        sender:users!chat_messages_sender_id_fkey (
                            id,
                            first_name,
                            last_name,
                            email,
                            is_admin,
                            chat_display_name
                        )
                    `)
                    .eq('conversation_id', selectedTicketId)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                renderMessages(data || []);
                if (data && data.length > 0) {
                    lastMessageTimestamp = data[data.length - 1].created_at;
                }

            } catch (err) {
                console.error('Error loading messages:', err);
                container.innerHTML = `
                    <div class="chat-empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
                        </svg>
                        <h3>Error Loading Messages</h3>
                        <p>Please try refreshing the page.</p>
                    </div>`;
            }
        }

        // ============================================================
        // RENDER MESSAGES
        // ============================================================
        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="chat-empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                        <h3>No Messages Yet</h3>
                        <p>Send a message to start the conversation.</p>
                    </div>`;
                return;
            }

            let html = '';
            let lastDate = '';

            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toLocaleDateString('en-US', {
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric'
                });

                if (msgDate !== lastDate) {
                    html += `<div class="msg-date-separator"><span>${msgDate}</span></div>`;
                    lastDate = msgDate;
                }

                const isMe = msg.sender_id === currentUser.id;
                const senderName = msg.display_name_override
                    || (msg.sender ? (msg.sender.chat_display_name || ((msg.sender.first_name || '') + ' ' + (msg.sender.last_name || '')).trim() || msg.sender.email) : null)
                    || (isMe ? 'You' : 'Team');
                const initialsSource = msg.display_name_override || (msg.sender ? (msg.sender.chat_display_name || ((msg.sender.first_name || '') + ' ' + (msg.sender.last_name || '')).trim()) : null);
                const initials = initialsSource
                    ? initialsSource.split(' ').map(n => n[0]).join('').substring(0, 2)
                    : (isMe ? 'Y' : 'T');
                const timeStr = new Date(msg.created_at).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                html += `
                    <div class="msg-row ${isMe ? 'me' : 'them'}" data-msg-id="${msg.id}">
                        <div class="msg-avatar">${(initials || '?').toUpperCase()}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${escapeHtml(msg.content || msg.message || '')}</div>
                            <div class="msg-meta">
                                <span class="msg-sender">${escapeHtml(isMe ? 'You' : senderName)}</span>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;

            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================================
        // SUBSCRIBE TO REALTIME MESSAGES
        // ============================================================
        function subscribeToMessages() {
            if (!selectedTicketId) return;

            // Cleanup previous subscription
            if (messagesSubscription) {
                window.supabaseClient.removeChannel(messagesSubscription);
            }

            messagesSubscription = window.supabaseClient
                .channel('client-chat-' + selectedTicketId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${selectedTicketId}`
                }, (payload) => {
                    if (payload.new.sender_id !== currentUser.id) {
                        appendMessage(payload.new);
                    }
                    if (payload.new.created_at) {
                        lastMessageTimestamp = payload.new.created_at;
                    }
                })
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'chat_conversations',
                    filter: `id=eq.${selectedTicketId}`
                }, (payload) => {
                    if (payload.new) {
                        selectedTicketStatus = payload.new.status || 'open';
                        const isOpen = selectedTicketStatus === 'open';

                        document.getElementById('resolvedBanner').style.display = isOpen ? 'none' : '';
                        document.getElementById('chatInputArea').style.display = isOpen ? '' : 'none';

                        // Update header status badge
                        document.getElementById('chatHeaderStatus').innerHTML = `
                            <span class="ticket-status ${isOpen ? 'open' : 'resolved'}">
                                ${isOpen ? '<span class="status-dot"></span>' : ''}
                                ${isOpen ? 'Open' : 'Resolved'}
                            </span>`;

                        if (payload.new.user_unread_count > 0) {
                            window.supabaseClient
                                .from('chat_conversations')
                                .update({ user_unread_count: 0 })
                                .eq('id', selectedTicketId);
                        }
                    }
                })
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                });
        }

        // ============================================================
        // POLLING FALLBACK (every 12s)
        // ============================================================
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);

            pollingInterval = setInterval(async () => {
                if (!selectedTicketId || currentView !== 'chat') return;
                try {
                    let query = window.supabaseClient
                        .from('chat_messages')
                        .select('*, sender:users!chat_messages_sender_id_fkey (id, first_name, last_name, email, is_admin, chat_display_name)')
                        .eq('conversation_id', selectedTicketId)
                        .order('created_at', { ascending: false })
                        .limit(5);

                    if (lastMessageTimestamp) {
                        query = query.gt('created_at', lastMessageTimestamp);
                    }

                    const { data, error } = await query;
                    if (error) throw error;

                    if (data && data.length > 0) {
                        const newMsgs = data.reverse();
                        for (const msg of newMsgs) {
                            if (msg.sender_id === currentUser.id) continue;
                            if (document.querySelector(`[data-msg-id="${msg.id}"]`)) continue;
                            appendMessage(msg);
                        }
                        lastMessageTimestamp = newMsgs[newMsgs.length - 1].created_at;
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 12000);
        }

        // ============================================================
        // APPEND SINGLE MESSAGE (REALTIME)
        // ============================================================
        async function appendMessage(msg) {
            const container = document.getElementById('chatMessages');

            if (container.querySelector('.chat-empty-state')) {
                container.innerHTML = '';
            }

            // Fetch sender info
            let sender = null;
            if (msg.sender_id) {
                const { data } = await window.supabaseClient
                    .from('users')
                    .select('id, first_name, last_name, email, is_admin, chat_display_name')
                    .eq('id', msg.sender_id)
                    .single();
                sender = data;
            }

            const isMe = msg.sender_id === currentUser.id;
            const senderName = msg.display_name_override
                || (sender ? (sender.chat_display_name || ((sender.first_name || '') + ' ' + (sender.last_name || '')).trim() || sender.email) : null)
                || (isMe ? 'You' : 'Team');
            const initialsSource = msg.display_name_override || (sender ? (sender.chat_display_name || ((sender.first_name || '') + ' ' + (sender.last_name || '')).trim()) : null);
            const initials = initialsSource
                ? initialsSource.split(' ').map(n => n[0]).join('').substring(0, 2)
                : (isMe ? 'Y' : 'T');
            const timeStr = new Date(msg.created_at).toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });

            const msgHtml = `
                <div class="msg-row ${isMe ? 'me' : 'them'}" data-msg-id="${msg.id}">
                    <div class="msg-avatar">${(initials || '?').toUpperCase()}</div>
                    <div class="msg-content">
                        <div class="msg-bubble">${escapeHtml(msg.content || msg.message || '')}</div>
                        <div class="msg-meta">
                            <span class="msg-sender">${escapeHtml(isMe ? 'You' : senderName)}</span>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    </div>
                </div>`;

            container.insertAdjacentHTML('beforeend', msgHtml);

            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnSend');
            const text = input.value.trim();

            if (!text || !currentUser || !selectedTicketId) return;

            btn.disabled = true;
            input.disabled = true;

            try {
                // If ticket was resolved, reopen it
                if (selectedTicketStatus === 'resolved') {
                    await window.supabaseClient
                        .from('chat_conversations')
                        .update({
                            status: 'open',
                            resolved_at: null
                        })
                        .eq('id', selectedTicketId);

                    selectedTicketStatus = 'open';
                    document.getElementById('resolvedBanner').style.display = 'none';
                    document.getElementById('chatInputArea').style.display = '';

                    document.getElementById('chatHeaderStatus').innerHTML = `
                        <span class="ticket-status open">
                            <span class="status-dot"></span>
                            Open
                        </span>`;
                }

                // Insert message
                const { data: newMsg, error: msgError } = await window.supabaseClient
                    .from('chat_messages')
                    .insert({
                        conversation_id: selectedTicketId,
                        sender_id: currentUser.id,
                        sender_type: 'customer',
                        content: text,
                        message: text
                    })
                    .select()
                    .single();

                if (msgError) throw msgError;

                // Update conversation metadata
                await window.supabaseClient
                    .from('chat_conversations')
                    .update({
                        last_message_at: new Date().toISOString(),
                        last_message_preview: text.substring(0, 100),
                        admin_unread_count: 1
                    })
                    .eq('id', selectedTicketId);

                // Clear input
                input.value = '';
                input.style.height = 'auto';

                // Append locally
                const container = document.getElementById('chatMessages');
                if (container.querySelector('.chat-empty-state')) {
                    container.innerHTML = '';
                }

                const myInitials = currentProfile
                    ? ((currentProfile.first_name || '')[0] || '') + ((currentProfile.last_name || '')[0] || '')
                    : 'Y';
                const timeStr = new Date().toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                const msgHtml = `
                    <div class="msg-row me" data-msg-id="${newMsg.id}">
                        <div class="msg-avatar">${(myInitials || 'Y').toUpperCase()}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${escapeHtml(text)}</div>
                            <div class="msg-meta">
                                <span class="msg-sender">You</span>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        </div>
                    </div>`;

                container.insertAdjacentHTML('beforeend', msgHtml);

                requestAnimationFrame(() => {
                    container.scrollTop = container.scrollHeight;
                });

                // Update lastMessageTimestamp
                if (newMsg.created_at) {
                    lastMessageTimestamp = newMsg.created_at;
                }

            } catch (err) {
                console.error('Error sending message:', err);
                showToast('Failed to send message. Please try again.', 'error');
            } finally {
                input.disabled = false;
                input.focus();
                toggleSendBtn();
            }
        }

        // ============================================================
        // INPUT HELPERS
        // ============================================================
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResizeInput(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function toggleSendBtn() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnSend');
            btn.disabled = !input.value.trim();
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function formatRelativeTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHrs = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return diffMins + (diffMins === 1 ? ' minute ago' : ' minutes ago');
            if (diffHrs < 24) return diffHrs + (diffHrs === 1 ? ' hour ago' : ' hours ago');
            if (diffDays < 7) return diffDays + (diffDays === 1 ? ' day ago' : ' days ago');
            return formatDate(dateStr);
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        // Cleanup on page leave
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
            if (messagesSubscription) {
                window.supabaseClient.removeChannel(messagesSubscription);
            }
        });
    </script>
</body>
</html>
