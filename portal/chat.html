<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Insider - Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Gilroy ExtraBold';
            src: url('../Gilroy%20ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --accent: #f0c832;
            --accent-light: #f7d954;
            --accent-dim: rgba(240, 200, 50, 0.15);
            --accent-glow: rgba(240, 200, 50, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2a2a;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== Background ========== */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dot-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(240, 200, 50, 0.18) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            /* filter blur removed for performance */
            opacity: 0.3;
            /* animation: floatOrb */ animation: none 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px; right: -100px;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(240, 200, 50, 0.2) 0%, transparent 70%);
            bottom: -80px; left: -80px;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        /* ========== Layout ========== */
        .support-wrapper {
            position: relative;
            z-index: 2;
            padding-left: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== SUPPORT HUB VIEW ========== */
        .support-hub {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .support-hero {
            text-align: center;
            padding: 56px 32px 40px;
            flex-shrink: 0;
        }

        .support-hero-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(240, 200, 50, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .support-hero-icon svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .support-hero h1 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 28px;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .support-hero p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .btn-start-conv {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 14px;
            font-family: 'Manrope', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-start-conv:hover:not(:disabled) {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(240, 200, 50, 0.3);
        }

        .btn-start-conv:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start-conv svg {
            width: 18px;
            height: 18px;
        }

        /* Conversation History */
        .conv-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 32px 32px;
        }

        .conv-history::-webkit-scrollbar { width: 5px; }
        .conv-history::-webkit-scrollbar-track { background: transparent; }
        .conv-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .conv-section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .conv-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .conv-section-label.past {
            margin-top: 24px;
        }

        /* Conversation Card */
        .conv-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .conv-card:hover {
            border-color: rgba(240, 200, 50, 0.2);
            background: rgba(20, 20, 20, 0.9);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .conv-card-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(240, 200, 50, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .conv-card-avatar svg {
            width: 18px;
            height: 18px;
            color: var(--accent);
        }

        .conv-card-body {
            flex: 1;
            min-width: 0;
        }

        .conv-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .conv-card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .conv-card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .conv-card-dot.active {
            background: var(--success);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
        }

        .conv-card-dot.resolved {
            background: var(--text-muted);
        }

        .conv-card-dot.escalated {
            background: #f59e0b;
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.4);
        }

        .conv-card-status-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
        }

        .conv-card-status-badge.escalated {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .conv-card-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .conv-card-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-card-arrow {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .conv-card:hover .conv-card-arrow {
            opacity: 1;
        }

        /* Empty state */
        .conv-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ========== CHAT VIEW ========== */
        .chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .chat-view.visible {
            display: flex;
        }

        .chat-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            /* backdrop-filter removed for performance */
            -webkit-/* backdrop-filter removed for performance */
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
        }

        .btn-back svg {
            width: 16px;
            height: 16px;
        }

        .chat-header-team {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .chat-header-team-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid rgba(240, 200, 50, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-header-team-avatar svg {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }

        .chat-header-team-info {
            min-width: 0;
        }

        .chat-header-team-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chat-header-team-status {
            font-size: 11px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-header-team-status .online-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        /* Resolved Banner */
        .resolved-banner {
            padding: 10px 24px;
            background: rgba(107, 114, 128, 0.08);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .resolved-banner svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ========== Messages ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 0;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-date-separator {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .msg-date-separator::before,
        .msg-date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .msg-date-separator span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 72%;
        }

        .msg-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.them {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-row.me .msg-avatar {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(240, 200, 50, 0.2);
        }

        .msg-row.them .msg-avatar {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .msg-row.me .msg-content { align-items: flex-end; }
        .msg-row.them .msg-content { align-items: flex-start; }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.me .msg-bubble {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .msg-row.them .msg-bubble {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-sender { font-weight: 600; }

        /* Typing Indicator */
        .typing-indicator {
            padding: 0 24px 8px;
        }

        .typing-bubble {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 12px 18px !important;
            min-width: 60px;
        }

        .typing-bubble .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-bubble .dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-bubble .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ========== Input Area ========== */
        .chat-input-area {
            padding: 12px 24px 20px;
            border-top: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            /* backdrop-filter removed for performance */
            -webkit-/* backdrop-filter removed for performance */
        }

        .chat-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            transition: border-color 0.2s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240, 200, 50, 0.08);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            outline: none;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .btn-send {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-send svg { width: 17px; height: 17px; }

        /* ========== Empty / Loading ========== */
        .chat-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .chat-empty-state h3 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .chat-empty-state p { font-size: 14px; }

        .loading-spinner {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: var(--success); }
        .toast.error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--error); }

        /* ========== Mobile ========== */
        @media (max-width: 768px) {
            .support-wrapper { padding-left: 0; }
            .support-hero { padding: 40px 20px 28px; }
            .support-hero h1 { font-size: 24px; }
            .conv-history { padding: 0 20px 20px; }
            .chat-header { padding: 12px 16px; }
            .chat-messages { padding: 16px 16px 8px; }
            .chat-input-area { padding: 10px 16px 16px; }
            .msg-row { max-width: 85%; }
            .typing-indicator { padding: 0 16px 8px; }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="dot-pattern"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Wrapper -->
    <div class="support-wrapper" id="supportWrapper" style="display: none;">

        <!-- ========== SUPPORT HUB ========== -->
        <div class="support-hub" id="supportHub">
            <div class="support-hero">
                <div class="support-hero-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                    </svg>
                </div>
                <h1>How can we help?</h1>
                <p>Our team is here to assist you</p>
                <button class="btn-start-conv" id="btnStartConv" onclick="startConversation()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z" />
                    </svg>
                    Start a Conversation
                </button>
            </div>

            <div class="conv-history" id="convHistory">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- ========== CHAT VIEW ========== -->
        <div class="chat-view" id="chatView">
            <div class="chat-header">
                <button class="btn-back" onclick="backToHub()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                    </svg>
                    Back
                </button>
                <div class="chat-header-team">
                    <div class="chat-header-team-avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                        </svg>
                    </div>
                    <div class="chat-header-team-info">
                        <div class="chat-header-team-name" id="chatTeamName">Support Team</div>
                        <div class="chat-header-team-status">
                            <span class="online-dot"></span>
                            <span>Available</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Resolved banner -->
            <div class="resolved-banner" id="resolvedBanner" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>This conversation has been resolved. Send a message to reopen it.</span>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>

            <!-- Typing indicator (for future AI integration) -->
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="msg-row them">
                    <div class="msg-avatar" style="background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(240,200,50,0.2); font-size: 9px;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                        </svg>
                    </div>
                    <div class="msg-content">
                        <div class="msg-bubble typing-bubble" style="background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-bottom-left-radius: 4px;">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="chat-input-area" id="chatInputArea">
                <div class="chat-input-wrapper">
                    <textarea
                        class="chat-input"
                        id="chatInput"
                        placeholder="Send a message..."
                        rows="1"
                        onkeydown="handleInputKeydown(event)"
                        oninput="autoResizeInput(this); toggleSendBtn();"
                    ></textarea>
                    <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="../activity-tracker.js"></script>
    <script>
        // ============================================================
        // STATE
        // ============================================================
        let currentUser = null;
        let currentProfile = null;
        let autoLogoutTimer = null;

        let currentView = 'hub';
        let allConversations = [];
        let selectedConvId = null;
        let selectedConvStatus = 'open';
        let teamDisplayName = 'Support Team';

        let messagesSubscription = null;
        let pollingInterval = null;
        let lastMessageTimestamp = null;

        // ============================================================
        // AUTO-LOGOUT
        // ============================================================
        function resetAutoLogout() {
            if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
            autoLogoutTimer = setTimeout(() => { window.signOut(); }, 30 * 60 * 1000);
        }

        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, resetAutoLogout, { passive: true });
        });

        // ============================================================
        // INIT
        // ============================================================
        (async function init() {
            try {
                const user = await window.getCurrentUser();
                if (!user) { window.location.href = '/auth'; return; }
                currentUser = user;

                const profile = await window.getUserProfile(user.id);
                if (!profile) { window.location.href = '/auth'; return; }
                currentProfile = profile;

                const userStatus = (profile.status || 'onboarding').toLowerCase();
                if (userStatus === 'free_trial' || userStatus === 'free_trial_expired') {
                    window.location.href = '/';
                    return;
                }
                if (!['member', 'verified_member', 'active'].includes(userStatus)) {
                    window.location.href = '/onboarding';
                    return;
                }

                window.injectClientSidebar('messages', '../logo.png', userStatus);
                resetAutoLogout();

                if (typeof window.trackActivity === 'function') {
                    window.trackActivity('page_view', '/portal/chat');
                }

                // Load AI config for team display name
                try {
                    const aiConfig = await window.getAIChatConfig();
                    teamDisplayName = aiConfig.ai_display_name || 'Support Team';
                } catch (e) { /* use default */ }

                document.getElementById('supportWrapper').style.display = '';
                await loadConversations();

            } catch (err) {
                console.error('Init error:', err);
                if (!currentUser) window.location.href = '/auth';
            }
        })();

        // ============================================================
        // LOAD CONVERSATIONS
        // ============================================================
        async function loadConversations() {
            const area = document.getElementById('convHistory');
            area.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('chat_conversations')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allConversations = data || [];
                renderConversationList();

            } catch (err) {
                console.error('Error loading conversations:', err);
                area.innerHTML = '<div class="conv-empty">Failed to load conversations. Please refresh.</div>';
            }
        }

        // ============================================================
        // RENDER CONVERSATION LIST
        // ============================================================
        function renderConversationList() {
            const area = document.getElementById('convHistory');

            if (allConversations.length === 0) {
                area.innerHTML = '<div class="conv-empty">No conversations yet. Start a new one above!</div>';
                return;
            }

            const active = allConversations.filter(c => (c.status || 'open') === 'open');
            const resolved = allConversations.filter(c => (c.status || 'open') !== 'open');

            let html = '';

            if (active.length > 0) {
                html += '<div class="conv-section-label">Active</div>';
                active.forEach(c => { html += renderConvCard(c, true); });
            }

            if (resolved.length > 0) {
                html += `<div class="conv-section-label ${active.length > 0 ? 'past' : ''}">Past Conversations</div>`;
                resolved.forEach(c => { html += renderConvCard(c, false); });
            }

            area.innerHTML = html;
        }

        function renderConvCard(conv, isActive) {
            const preview = escapeHtml(conv.last_message_preview || 'No messages yet');
            const timeStr = isActive
                ? formatRelativeTime(conv.last_message_at || conv.created_at)
                : formatDate(conv.resolved_at || conv.updated_at || conv.created_at);

            const isEscalated = conv.is_escalated === true;
            const dotClass = isEscalated ? 'escalated' : (isActive ? 'active' : 'resolved');
            const statusBadge = isEscalated ? '<span class="conv-card-status-badge escalated">Escalated</span>' : '';

            return `
                <div class="conv-card" onclick="openChatView('${conv.id}')">
                    <div class="conv-card-avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155" />
                        </svg>
                    </div>
                    <div class="conv-card-body">
                        <div class="conv-card-top">
                            <span class="conv-card-name">
                                <span class="conv-card-dot ${dotClass}"></span>
                                ${escapeHtml(teamDisplayName)}${statusBadge}
                            </span>
                            <span class="conv-card-time">${timeStr}</span>
                        </div>
                        <div class="conv-card-preview">${preview}</div>
                    </div>
                    <svg class="conv-card-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                    </svg>
                </div>`;
        }

        // ============================================================
        // START A CONVERSATION
        // ============================================================
        async function startConversation() {
            const btn = document.getElementById('btnStartConv');
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                const aiConfig = await window.getAIChatConfig();
                const greetingText = aiConfig.greeting_message || 'Hi! How can I help you today?';
                const displayName = aiConfig.ai_display_name || 'Support Team';

                // Create conversation
                const { data: newConv, error: convError } = await window.supabaseClient
                    .from('chat_conversations')
                    .insert({
                        user_id: currentUser.id,
                        status: 'open',
                        handler_type: 'ai',
                        category: 'ai',
                        title: 'Support Request',
                        last_message_at: new Date().toISOString(),
                        last_message_preview: greetingText.substring(0, 100),
                        user_unread_count: 0
                    })
                    .select()
                    .single();

                if (convError) throw convError;

                // Insert greeting from "team"
                await window.supabaseClient
                    .from('chat_messages')
                    .insert({
                        conversation_id: newConv.id,
                        sender_id: currentUser.id,
                        sender_type: 'admin',
                        content: greetingText,
                        message: greetingText,
                        is_ai_message: true,
                        display_name_override: displayName
                    });

                allConversations.unshift(newConv);
                await openChatView(newConv.id);

            } catch (err) {
                console.error('Error starting conversation:', err);
                showToast('Failed to start conversation. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z" />
                    </svg>
                    Start a Conversation`;
            }
        }

        // ============================================================
        // OPEN CHAT VIEW
        // ============================================================
        async function openChatView(convId) {
            const conv = allConversations.find(c => c.id === convId);
            if (!conv) return;

            selectedConvId = convId;
            selectedConvStatus = conv.status || 'open';
            currentView = 'chat';
            lastMessageTimestamp = null;

            // Set team name in header
            document.getElementById('chatTeamName').textContent = teamDisplayName;

            // Resolved state
            const isOpen = selectedConvStatus === 'open';
            document.getElementById('resolvedBanner').style.display = isOpen ? 'none' : '';
            document.getElementById('chatInputArea').style.display = isOpen ? '' : 'none';

            // Switch views
            document.getElementById('supportHub').style.display = 'none';
            document.getElementById('chatView').classList.add('visible');

            // Mark read
            if (conv.user_unread_count > 0) {
                window.supabaseClient
                    .from('chat_conversations')
                    .update({ user_unread_count: 0 })
                    .eq('id', convId);
            }

            await loadMessages();
            subscribeToMessages();
            startPolling();
        }

        // ============================================================
        // BACK TO HUB
        // ============================================================
        function backToHub() {
            currentView = 'hub';
            selectedConvId = null;
            lastMessageTimestamp = null;

            if (messagesSubscription) {
                window.supabaseClient.removeChannel(messagesSubscription);
                messagesSubscription = null;
            }
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            document.getElementById('chatView').classList.remove('visible');
            document.getElementById('supportHub').style.display = '';
            loadConversations();
        }

        // ============================================================
        // LOAD MESSAGES
        // ============================================================
        async function loadMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('chat_messages')
                    .select(`
                        *,
                        sender:users!chat_messages_sender_id_fkey (
                            id, first_name, last_name, email, is_admin, chat_display_name
                        )
                    `)
                    .eq('conversation_id', selectedConvId)
                    .order('created_at', { ascending: true });

                if (error) throw error;
                renderMessages(data || []);
                if (data && data.length > 0) {
                    lastMessageTimestamp = data[data.length - 1].created_at;
                }
            } catch (err) {
                console.error('Error loading messages:', err);
                container.innerHTML = '<div class="chat-empty-state"><h3>Error Loading Messages</h3><p>Please try refreshing the page.</p></div>';
            }
        }

        // ============================================================
        // RENDER MESSAGES
        // ============================================================
        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');

            if (messages.length === 0) {
                container.innerHTML = '<div class="chat-empty-state"><h3>No Messages Yet</h3><p>Send a message to start the conversation.</p></div>';
                return;
            }

            let html = '';
            let lastDate = '';

            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                if (msgDate !== lastDate) {
                    html += `<div class="msg-date-separator"><span>${msgDate}</span></div>`;
                    lastDate = msgDate;
                }

                // Determine if this is "me" (customer) or "them" (team/AI)
                const isMe = msg.sender_type === 'customer';
                const senderName = isMe ? 'You' : (msg.display_name_override || (msg.sender ? (msg.sender.chat_display_name || ((msg.sender.first_name || '') + ' ' + (msg.sender.last_name || '')).trim() || msg.sender.email) : teamDisplayName));

                const initialsRaw = isMe
                    ? ((currentProfile?.first_name || '')[0] || '') + ((currentProfile?.last_name || '')[0] || '')
                    : '';
                const initials = initialsRaw || (isMe ? 'Y' : '');

                const timeStr = new Date(msg.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

                // For "them" messages, show a chat icon instead of initials
                const avatarContent = isMe
                    ? `${(initials || 'Y').toUpperCase()}`
                    : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>`;

                const themAvatarStyle = isMe ? '' : ' style="background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(240,200,50,0.2);"';

                html += `
                    <div class="msg-row ${isMe ? 'me' : 'them'}" data-msg-id="${msg.id}">
                        <div class="msg-avatar"${themAvatarStyle}>${avatarContent}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${escapeHtml(msg.content || msg.message || '')}</div>
                            <div class="msg-meta">
                                <span class="msg-sender">${escapeHtml(senderName)}</span>
                                <span>${timeStr}</span>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;
            requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
        }

        // ============================================================
        // REALTIME + POLLING
        // ============================================================
        function subscribeToMessages() {
            if (!selectedConvId) return;
            if (messagesSubscription) window.supabaseClient.removeChannel(messagesSubscription);

            messagesSubscription = window.supabaseClient
                .channel('client-chat-' + selectedConvId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${selectedConvId}`
                }, (payload) => {
                    if (payload.new.sender_type !== 'customer') {
                        appendMessage(payload.new);
                    }
                    if (payload.new.created_at) lastMessageTimestamp = payload.new.created_at;
                })
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'chat_conversations',
                    filter: `id=eq.${selectedConvId}`
                }, (payload) => {
                    if (payload.new) {
                        selectedConvStatus = payload.new.status || 'open';
                        const isOpen = selectedConvStatus === 'open';
                        document.getElementById('resolvedBanner').style.display = isOpen ? 'none' : '';
                        document.getElementById('chatInputArea').style.display = isOpen ? '' : 'none';
                        if (payload.new.user_unread_count > 0) {
                            window.supabaseClient.from('chat_conversations').update({ user_unread_count: 0 }).eq('id', selectedConvId);
                        }
                    }
                })
                .subscribe();
        }

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                if (!selectedConvId || currentView !== 'chat') return;
                try {
                    let query = window.supabaseClient
                        .from('chat_messages')
                        .select('*, sender:users!chat_messages_sender_id_fkey (id, first_name, last_name, email, is_admin, chat_display_name)')
                        .eq('conversation_id', selectedConvId)
                        .order('created_at', { ascending: false })
                        .limit(5);

                    if (lastMessageTimestamp) query = query.gt('created_at', lastMessageTimestamp);

                    const { data, error } = await query;
                    if (error) throw error;

                    if (data && data.length > 0) {
                        const newMsgs = data.reverse();
                        for (const msg of newMsgs) {
                            if (msg.sender_type === 'customer') continue;
                            if (document.querySelector(`[data-msg-id="${msg.id}"]`)) continue;
                            appendMessage(msg);
                        }
                        lastMessageTimestamp = newMsgs[newMsgs.length - 1].created_at;
                    }
                } catch (err) { console.error('Polling error:', err); }
            }, 12000);
        }

        // ============================================================
        // APPEND MESSAGE
        // ============================================================
        async function appendMessage(msg) {
            const container = document.getElementById('chatMessages');
            if (container.querySelector('.chat-empty-state')) container.innerHTML = '';

            let sender = null;
            if (msg.sender_id) {
                const { data } = await window.supabaseClient.from('users').select('id, first_name, last_name, email, is_admin, chat_display_name').eq('id', msg.sender_id).single();
                sender = data;
            }

            const isMe = msg.sender_type === 'customer';
            const senderName = isMe ? 'You' : (msg.display_name_override || (sender ? (sender.chat_display_name || ((sender.first_name || '') + ' ' + (sender.last_name || '')).trim() || sender.email) : teamDisplayName));
            const timeStr = new Date(msg.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

            const avatarContent = isMe
                ? ((currentProfile?.first_name || '')[0] || 'Y').toUpperCase() + ((currentProfile?.last_name || '')[0] || '').toUpperCase()
                : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>`;
            const themAvatarStyle = isMe ? '' : ' style="background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(240,200,50,0.2);"';

            const msgHtml = `
                <div class="msg-row ${isMe ? 'me' : 'them'}" data-msg-id="${msg.id}">
                    <div class="msg-avatar"${themAvatarStyle}>${avatarContent}</div>
                    <div class="msg-content">
                        <div class="msg-bubble">${escapeHtml(msg.content || msg.message || '')}</div>
                        <div class="msg-meta">
                            <span class="msg-sender">${escapeHtml(senderName)}</span>
                            <span>${timeStr}</span>
                        </div>
                    </div>
                </div>`;

            container.insertAdjacentHTML('beforeend', msgHtml);
            requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnSend');
            const text = input.value.trim();
            if (!text || !currentUser || !selectedConvId) return;

            btn.disabled = true;
            input.disabled = true;

            try {
                // Reopen if resolved
                if (selectedConvStatus === 'resolved') {
                    await window.supabaseClient
                        .from('chat_conversations')
                        .update({ status: 'open', resolved_at: null })
                        .eq('id', selectedConvId);
                    selectedConvStatus = 'open';
                    document.getElementById('resolvedBanner').style.display = 'none';
                    document.getElementById('chatInputArea').style.display = '';
                }

                const { data: newMsg, error: msgError } = await window.supabaseClient
                    .from('chat_messages')
                    .insert({
                        conversation_id: selectedConvId,
                        sender_id: currentUser.id,
                        sender_type: 'customer',
                        content: text,
                        message: text
                    })
                    .select()
                    .single();

                if (msgError) throw msgError;

                await window.supabaseClient
                    .from('chat_conversations')
                    .update({
                        last_message_at: new Date().toISOString(),
                        last_message_preview: text.substring(0, 100),
                        admin_unread_count: 1
                    })
                    .eq('id', selectedConvId);

                input.value = '';
                input.style.height = 'auto';

                // Append locally
                const container = document.getElementById('chatMessages');
                if (container.querySelector('.chat-empty-state')) container.innerHTML = '';

                const myInitials = ((currentProfile?.first_name || '')[0] || 'Y').toUpperCase() + ((currentProfile?.last_name || '')[0] || '').toUpperCase();
                const timeStr = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

                container.insertAdjacentHTML('beforeend', `
                    <div class="msg-row me" data-msg-id="${newMsg.id}">
                        <div class="msg-avatar">${myInitials}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${escapeHtml(text)}</div>
                            <div class="msg-meta">
                                <span class="msg-sender">You</span>
                                <span>${timeStr}</span>
                            </div>
                        </div>
                    </div>`);

                requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
                if (newMsg.created_at) lastMessageTimestamp = newMsg.created_at;

            } catch (err) {
                console.error('Error sending message:', err);
                showToast('Failed to send message. Please try again.', 'error');
            } finally {
                input.disabled = false;
                input.focus();
                toggleSendBtn();
            }
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function autoResizeInput(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function toggleSendBtn() {
            document.getElementById('btnSend').disabled = !document.getElementById('chatInput').value.trim();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function formatRelativeTime(dateStr) {
            const diffMs = Date.now() - new Date(dateStr);
            const mins = Math.floor(diffMs / 60000);
            const hrs = Math.floor(diffMs / 3600000);
            const days = Math.floor(diffMs / 86400000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            if (hrs < 24) return hrs + 'h ago';
            if (days < 7) return days + 'd ago';
            return formatDate(dateStr);
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
            if (messagesSubscription) window.supabaseClient.removeChannel(messagesSubscription);
        });
    </script>
</body>
</html>
