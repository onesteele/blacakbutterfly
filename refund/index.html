<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Insider Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #f0f0f2;
            --surface: #ffffff;
            --border: #e5e5e7;
            --border-hover: #d1d1d4;
            --text: #0e0e0f;
            --text-secondary: #6b6b6f;
            --text-muted: #9b9ba0;
            --accent: #ff6243;
            --accent-light: #ff8066;
            --accent-bg: rgba(255, 98, 67, 0.08);
            --accent-border: rgba(255, 98, 67, 0.2);
            --success: #00b341;
            --success-bg: rgba(0, 179, 65, 0.08);
            --success-border: rgba(0, 179, 65, 0.2);
            --error: #e5484d;
            --error-bg: rgba(229, 72, 77, 0.06);
            --error-border: rgba(229, 72, 77, 0.2);
            --warning: #f5a623;
            --warning-bg: rgba(245, 166, 35, 0.08);
            --warning-border: rgba(245, 166, 35, 0.25);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 80px;
        }

        /* ── Header ── */
        .page-header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease;
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .whop-logo { height: 28px; opacity: 0.85; }
        .logo-x { font-size: 16px; font-weight: 600; color: var(--text-muted); user-select: none; }
        .pi-logo { height: 32px; border-radius: 6px; }

        .page-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ── Chat Card ── */
        .chat-card {
            width: 100%;
            max-width: 540px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease 0.1s both;
            max-height: calc(100vh - 180px);
            min-height: 560px;
        }

        /* ── Chat Header ── */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            position: relative;
        }

        .agent-avatar::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--success);
            border: 2px solid var(--surface);
        }

        .agent-meta { flex: 1; min-width: 0; }

        .agent-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .agent-role {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--success);
            font-weight: 600;
        }

        .agent-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Messages Area ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-secondary);
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 100%;
            animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.agent { align-self: flex-start; max-width: 85%; }
        .msg-row.user { align-self: flex-end; max-width: 85%; justify-content: flex-end; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 11px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-row.agent .msg-bubble {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .msg-row.user .msg-bubble {
            background: var(--accent);
            color: #fff;
            border-top-right-radius: 4px;
            font-weight: 500;
        }

        .msg-bubble p { margin: 0; }
        .msg-bubble p + p { margin-top: 8px; }
        .msg-bubble strong { font-weight: 700; }

        /* ── Typing indicator ── */
        .typing-row {
            display: flex;
            gap: 8px;
            align-self: flex-start;
            max-width: 85%;
            animation: msgIn 0.2s ease;
        }

        .typing-bubble {
            padding: 12px 16px;
            border-radius: 14px;
            border-top-left-radius: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.3s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ── Clause Callout ── */
        .clause-card {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text);
        }

        .clause-card .clause-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--warning);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .clause-card .clause-text { line-height: 1.55; color: var(--text-secondary); }

        /* ── Deterrent Wall ── */
        .deterrent-wall {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-top: 10px;
            font-size: 13px;
        }

        .deterrent-wall .dw-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--error);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deterrent-wall .dw-title svg { width: 14px; height: 14px; }

        .deterrent-wall ul { list-style: none; padding: 0; margin: 0; }

        .deterrent-wall li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 5px 0;
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
        }

        .deterrent-wall li::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--error);
            margin-top: 8px;
            flex-shrink: 0;
        }

        .deterrent-wall .dw-footer {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--error-border);
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-style: italic;
        }

        /* ── Loom Embed ── */
        .loom-embed {
            margin-top: 10px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
        }

        .loom-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .loom-embed .loom-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .loom-wrap { margin-top: 10px; }
        .loom-wrap .loom-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        /* ── Terminal CTA ── */
        .terminal-cta {
            margin-top: 10px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 18px;
            background: var(--accent);
            color: #fff;
            border: 0;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s ease;
            width: 100%;
        }

        .cta-btn:hover {
            background: #e5543a;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(255, 98, 67, 0.25);
        }

        .cta-btn svg { width: 14px; height: 14px; }

        .cta-btn.secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .cta-btn.secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--border-hover);
            box-shadow: none;
        }

        /* ── Options Area ── */
        .chat-options {
            padding: 14px 16px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-options-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .option-btn {
            padding: 11px 14px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            animation: msgIn 0.25s ease;
        }

        .option-btn:hover {
            border-color: var(--accent);
            background: var(--accent-bg);
            transform: translateX(2px);
        }

        .option-btn:active { transform: translateX(0) scale(0.99); }

        .option-btn .option-arrow {
            opacity: 0;
            color: var(--accent);
            font-size: 15px;
            transition: opacity 0.12s ease;
            font-weight: 700;
        }

        .option-btn:hover .option-arrow { opacity: 1; }

        .option-btn[data-variant="danger"]:hover {
            border-color: var(--error);
            background: var(--error-bg);
        }

        .option-btn[data-variant="danger"]:hover .option-arrow {
            color: var(--error);
        }

        /* ── Restart pill ── */
        .restart-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            align-self: center;
        }

        .restart-pill:hover {
            color: var(--text);
            border-color: var(--border-hover);
            background: var(--bg-secondary);
        }

        .restart-pill svg { width: 12px; height: 12px; }

        /* ── Footer note ── */
        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.55;
            max-width: 540px;
        }

        .footer-note a { color: var(--text-secondary); text-decoration: underline; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .page-wrapper { padding: 20px 12px 60px; }
            .chat-card { min-height: 520px; max-height: calc(100vh - 140px); }
            .page-header h1 { font-size: 20px; }
        }
    </style>
</head>

                'The chargeback outcome doesn\'t save you from §15.3. The only thing that does is retracting in writing before your bank\'s withdrawal window closes.'
            ],
            deterrent: true,
            loom: true,
            options: [
                { label: 'Okay — walk me through how to retract',   next: 'chargeback-retract-path' },
                { label: 'I understand and accept the consequences', next: 'chargeback-final-close' },
                { label: 'Back to menu',                              next: 'start' }
            ]
        },

        'chargeback-final-close': {
            type: 'chargeback',
            agent: [
                'Understood. This conversation is being documented in your file, and the record — including the fact that you were given the opportunity to retract and declined — will be forwarded to Vanguard Retail Law along with the dispute evidence package.',
                'Your file is now in the enforcement queue. If you change your mind, retracting the dispute in writing to ' + SUPPORT_EMAIL + ' is still your fastest off-ramp until your bank\'s withdrawal window closes.'
            ],
            options: [
                { label: 'I\'ve changed my mind — how do I retract?', next: 'chargeback-retract-path' },
                { label: 'Close chat',                                 next: 'start' }
            ]
        },

        // ─── Settlement tier ──────────────────────────────────
        'settlement-intro': {
            type: 'settlement',
            agent: [
                'You got the Final Notice from Vanguard Retail Law. That means your file is already in the enforcement queue — collections through American Collection Systems Incorporated, legal proceedings for breach of contract under §15.3, and credit reporting on the scheduled timeline.',
                'There is <strong>one path</strong> available that stops all of that: a one-time settlement offer to close this matter. Let me walk you through how it works before you decide.'
            ],
            options: [
                { label: 'Yes, I want to hear the settlement terms', next: 'settlement-terms' },
                { label: 'Not interested',                           next: 'settlement-declined' }
            ]
        },

        'settlement-terms': {
            type: 'settlement',
            agent: [
                'Here\'s the structure. The settlement amount is <strong>65% of your disputed amount</strong> — a 35% reduction from the full balance you owe under your agreement. That number is <strong>not negotiable downward</strong>. No counter-offers, no payment plans — one-time payment in full, wire or card.',
                'In exchange, we drop the collections referral to American Collection Systems Incorporated, halt the legal proceedings through Vanguard Retail Law, waive all accrued attorneys\' fees and costs, and — critically — <strong>we do not report to Equifax, Experian, or TransUnion</strong>. The matter closes permanently with a full mutual release.',
                'There are three non-negotiable conditions to accept:<br><strong>1.</strong> You call your bank, retract the chargeback in writing, and send us the confirmation.<br><strong>2.</strong> We send you a Settlement Release Agreement — you sign and return it.<br><strong>3.</strong> You pay the settlement amount in full via the method we specify.',
                'You need to know the trade-off: accepting the settlement <strong>permanently terminates</strong> your access to the Profit Insider software. You walk away, we walk away, the file is closed forever.',
                'This offer expires in <strong>5 business days</strong> from today. If you don\'t complete all three conditions in that window, the offer is withdrawn and the matter returns to full enforcement.'
            ],
            options: [
                { label: 'Yes — I accept. Tell me how to proceed',       next: 'settlement-accept' },
                { label: 'Can you go lower than 65%?',                    next: 'settlement-hold-line' },
                { label: 'Can I do a payment plan?',                       next: 'settlement-no-plan' },
                { label: 'Let me think about it',                         next: 'settlement-delay' },
                { label: 'No — I\'m not paying anything',                  next: 'settlement-declined' }
            ]
        },

        'settlement-accept': {
            type: 'settlement',
            agent: [
                'Good — this is the right call.',
                'Next step is retraction first. Call your bank\'s dispute department right now, tell them you\'re withdrawing the dispute on the charge from Profit Insider, and get written confirmation (email, reference number, or statement). Forward that to <strong>' + SUPPORT_EMAIL + '</strong>.',
                'The moment we have the retraction confirmation, we\'ll email you the Settlement Release Agreement and the payment instructions. Sign the release, pay the settlement amount, and within 24 hours of receipt we notify Vanguard and American Collection Systems to stand down. File closed permanently.',
                'Do the retraction today. The bank\'s withdrawal window and your 5 business day settlement window are both running.'
            ],
            options: [
                { label: 'Got it — closing chat to call my bank', next: 'start' }
            ]
        },

        'settlement-hold-line': {
            type: 'settlement',
            agent: [
                'I hear you, and I\'m going to be transparent. The 65% number is not a negotiating starting point — it\'s already a significant reduction from the full balance Vanguard is pursuing through the legal process. I don\'t have the authority to go below it, and I wouldn\'t exercise it even if I did.',
                'The alternative to the settlement is not a lower settlement — it\'s the full enforcement process you\'ve already been noticed about. If the legal process moves forward and Vanguard Retail Law secures a judgment, you\'re responsible for the full disputed amount plus attorneys\' fees, arbitration fees, collection costs, and 1% monthly interest under §15.6 from the original due date. That can easily double your exposure.',
                'The 65% settlement resolves it today. That\'s the value proposition.'
            ],
            options: [
                { label: 'Okay — I\'ll take the settlement',    next: 'settlement-accept' },
                { label: 'Let me think about it',                next: 'settlement-delay' },
                { label: 'Not interested',                        next: 'settlement-declined' }
            ]
        },

        'settlement-no-plan': {
            type: 'settlement',
            agent: [
                'Settlements are one-time payments — no payment plans. The whole point is to resolve the matter in full and close the file. If you break a settlement payment plan, we\'re right back at collections and legal action, except now we\'ve both wasted time.',
                'If 65% isn\'t possible for you right now, think carefully. The alternative is more expensive. Full balance plus §15.5 fees, §15.6 interest, and §15.3 collections + credit damage will exceed the settlement amount significantly by the time it resolves.'
            ],
            options: [
                { label: 'I\'ll find the full amount — proceed with settlement', next: 'settlement-accept' },
                { label: 'Let me think about it',                                 next: 'settlement-delay' },
                { label: 'I can\'t do it',                                        next: 'settlement-declined' }
            ]
        },

        'settlement-delay': {
            type: 'settlement',
            agent: [
                'Take up to 24 hours if you need them — but the 5 business day deadline is firm. The pause I\'ve put on Vanguard and American Collection Systems is only good for the 5 business day settlement window. I can\'t extend beyond that.',
                'If you\'re proceeding, call your bank to retract and email <strong>' + SUPPORT_EMAIL + '</strong> with the confirmation. If you\'re not, the offer withdraws automatically at the end of the window and enforcement resumes.'
            ],
            options: [
                { label: 'Okay, I\'ll retract and accept now',       next: 'settlement-accept' },
                { label: 'Close chat',                                next: 'start' }
            ]
        },

        'settlement-declined': {
            type: 'settlement',
            agent: [
                'Understood. You\'ve declined the settlement offer. This decision is being documented in your file — including the fact that a good-faith, reduced-amount resolution was extended and rejected. That record will be used by Vanguard Retail Law in any subsequent arbitration proceedings.',
                'Effective immediately: the settlement window is closed, and the full enforcement process is proceeding. Vanguard Retail Law resumes the breach of contract proceedings under §15.3(c). Your account is active in collections with American Collection Systems Incorporated under §15.3(b). Credit bureau reporting is on the timeline outlined in your Final Notice under §15.3(e).'
            ],
            deterrent: true,
            loom: true,
            options: [
                { label: 'I\'ve changed my mind — I\'ll accept the settlement', next: 'settlement-terms' },
                { label: 'Close chat',                                           next: 'start' }
            ]
        }
    };

    // ──────────────────────────────────────────────────────────
    // State + DOM
    // ──────────────────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const optionsEl  = document.getElementById('options');

    let currentNode = 'start';
    let busy = false;

    // ──────────────────────────────────────────────────────────
    // Helpers
    // ──────────────────────────────────────────────────────────
    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing';
        row.innerHTML = '<div class="msg-avatar">C</div>' +
                        '<div class="typing-bubble">' +
                        '<span class="typing-dot"></span>' +
                        '<span class="typing-dot"></span>' +
                        '<span class="typing-dot"></span>' +
                        '</div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function hideTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    function addAgentMessage(html) {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        row.innerHTML = '<div class="msg-avatar">C</div>' +
                        '<div class="msg-bubble"><p>' + html + '</p></div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addClauseCard(clause) {
        const card = document.createElement('div');
        card.className = 'msg-row agent';
        card.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                         '<div style="flex:1">' +
                         '<div class="clause-card">' +
                         '<div class="clause-label">' + escapeHtml(clause.label) + '</div>' +
                         '<div class="clause-text">' + escapeHtml(clause.text) + '</div>' +
                         '</div></div>';
        messagesEl.appendChild(card);
        scrollToBottom();
    }

    function addDeterrentWall() {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        let listItems = DETERRENT_WALL.items.map(function (i) { return '<li>' + i + '</li>'; }).join('');
        row.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                        '<div style="flex:1"><div class="deterrent-wall">' +
                        '<div class="dw-title">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>' +
                        DETERRENT_WALL.title +
                        '</div>' +
                        '<ul>' + listItems + '</ul>' +
                        '<div class="dw-footer">' + DETERRENT_WALL.footer + '</div>' +
                        '</div></div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addLoomEmbed() {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        row.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                        '<div style="flex:1" class="loom-wrap">' +
                        '<span class="loom-label">Watch: why we enforce the contract this way</span>' +
                        '<div class="loom-embed">' +
                        '<iframe src="' + LOOM_EMBED_URL + '" frameborder="0" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>' +
                        '</div>' +
                        '</div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addTerminalCTA(cta) {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        row.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                        '<div style="flex:1" class="terminal-cta">' +
                        '<a href="' + cta.href + '" class="cta-btn">' +
                        escapeHtml(cta.label) +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>' +
                        '</a></div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function clearOptions() {
        optionsEl.innerHTML = '';
    }

    function setOptionsLabel(text) {
        const label = document.createElement('div');
        label.className = 'chat-options-label';
        label.textContent = text;
        optionsEl.appendChild(label);
    }

    function renderOptions(options, isTerminal) {
        clearOptions();
        if (isTerminal && (!options || options.length === 0)) {
            // Terminal node with no options → offer restart only
            setOptionsLabel('Conversation complete');
            const restart = document.createElement('button');
            restart.className = 'restart-pill';
            restart.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Start a new conversation';
            restart.onclick = function () { goTo('start'); };
            optionsEl.appendChild(restart);
            return;
        }
        setOptionsLabel(isTerminal ? 'What would you like to do next?' : 'Choose an option');
        options.forEach(function (opt) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            if (opt.variant) btn.dataset.variant = opt.variant;
            btn.innerHTML = '<span>' + escapeHtml(opt.label) + '</span><span class="option-arrow">&rarr;</span>';
            btn.onclick = function () {
                if (busy) return;
                addUserMessage(opt.label);
                goTo(opt.next);
            };
            optionsEl.appendChild(btn);
        });
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // ──────────────────────────────────────────────────────────
    // Flow controller
    // ──────────────────────────────────────────────────────────
    async function goTo(nodeId) {
        const node = flow[nodeId];
        if (!node) {
            console.error('Missing flow node:', nodeId);
            return;
        }
        currentNode = nodeId;
        busy = true;
        clearOptions();

        // Play agent messages with typing indicator between each
        const msgs = node.agent || [];
        for (let i = 0; i < msgs.length; i++) {
            showTyping();
            await wait(typingDelay(msgs[i]));
            hideTyping();
            addAgentMessage(msgs[i]);
            await wait(550);
        }

        // Clause callout
        if (node.clause) {
            await wait(400);
            addClauseCard(node.clause);
            await wait(500);
        }

        // Deterrent wall
        if (node.deterrent) {
            await wait(400);
            addDeterrentWall();
            await wait(500);
        }

        // Loom embed
        if (node.loom) {
            await wait(400);
            addLoomEmbed();
            await wait(500);
        }

        // Terminal CTA (eligible path)
        if (node.cta) {
            await wait(400);
            addTerminalCTA(node.cta);
            await wait(400);
        }

        // Render options
        const isTerminal = !!(node.type && ['eligible', 'denied'].indexOf(node.type) >= 0 && !node.options);
        renderOptions(node.options || (isTerminal ? [] : [{ label: 'Back to menu', next: 'start' }]), isTerminal);

        busy = false;
    }

    function typingDelay(text) {
        const base = Math.min(Math.max(text.replace(/<[^>]+>/g, '').length * 16, 750), 1600);
        return base;
    }

    function wait(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
    }

    // ──────────────────────────────────────────────────────────
    // Boot
    // ──────────────────────────────────────────────────────────
    goTo('start');

})();
</script>
</body>
</html>
