<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Insider - Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Gilroy ExtraBold';
            src: url('../Gilroy%20ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --accent: #f0c832;
            --accent-light: #f7d954;
            --accent-dim: rgba(240, 200, 50, 0.15);
            --accent-glow: rgba(240, 200, 50, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #2a2a2a;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== Background Animation ========== */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dot-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(240, 200, 50, 0.18) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px; right: -100px;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(240, 200, 50, 0.2) 0%, transparent 70%);
            bottom: -80px; left: -80px;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        /* ========== Chat Layout ========== */
        .chat-wrapper {
            position: relative;
            z-index: 2;
            padding-left: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .chat-header h1 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 22px;
            color: var(--text-primary);
        }

        .chat-header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ========== Messages Area ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Date Separator */
        .msg-date-separator {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .msg-date-separator::before,
        .msg-date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .msg-date-separator span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Message Rows */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 72%;
        }

        .msg-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-row.them {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-row.me .msg-avatar {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(240, 200, 50, 0.2);
        }

        .msg-row.them .msg-avatar {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .msg-content {
            display: flex;
            flex-direction: column;
        }

        .msg-row.me .msg-content {
            align-items: flex-end;
        }

        .msg-row.them .msg-content {
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-row.me .msg-bubble {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .msg-row.them .msg-bubble {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-sender {
            font-weight: 600;
        }

        /* ========== Chat Input Area ========== */
        .chat-input-area {
            padding: 16px 32px 24px;
            border-top: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .chat-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            transition: border-color 0.2s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240, 200, 50, 0.08);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
        }

        /* ========== Empty / Start State ========== */
        .chat-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .chat-empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .chat-empty-state h3 {
            font-family: 'Gilroy ExtraBold', sans-serif;
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .chat-empty-state p {
            font-size: 14px;
            max-width: 360px;
            line-height: 1.6;
        }

        /* ========== Loading Spinner ========== */
        .loading-spinner {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 10001;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        /* ========== Resolved Banner ========== */
        .resolved-banner {
            padding: 10px 32px;
            background: rgba(107, 114, 128, 0.1);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .resolved-banner svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ========== Mobile ========== */
        @media (max-width: 768px) {
            .chat-wrapper {
                padding-left: 0;
            }

            .chat-header {
                padding: 16px 20px;
            }

            .chat-messages {
                padding: 16px 20px;
            }

            .chat-input-area {
                padding: 12px 20px 20px;
            }

            .msg-row {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="dot-pattern"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Chat Layout -->
    <div class="chat-wrapper" id="chatWrapper" style="display: none;">
        <div class="chat-header">
            <h1>Messages</h1>
            <p>Chat with the Profit Insider team</p>
        </div>

        <!-- Resolved banner (hidden by default) -->
        <div class="resolved-banner" id="resolvedBanner" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>This conversation has been resolved. Send a new message to reopen it.</span>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="Type a message..."
                    rows="1"
                    onkeydown="handleInputKeydown(event)"
                    oninput="autoResizeInput(this); toggleSendBtn();"
                ></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="../activity-tracker.js"></script>
    <script>
        // ============================================================
        // AUTH CHECK & AUTO-LOGOUT
        // ============================================================
        let currentUser = null;
        let currentProfile = null;
        let autoLogoutTimer = null;
        let conversationId = null;
        let conversationStatus = 'open';
        let messagesSubscription = null;

        function resetAutoLogout() {
            if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
            autoLogoutTimer = setTimeout(() => {
                window.signOut();
            }, 30 * 60 * 1000);
        }

        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, resetAutoLogout, { passive: true });
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        (async function init() {
            try {
                const user = await window.getCurrentUser();
                if (!user) {
                    window.location.href = '/auth';
                    return;
                }
                currentUser = user;

                const profile = await window.getUserProfile(user.id);
                if (!profile) {
                    window.location.href = '/auth';
                    return;
                }
                currentProfile = profile;

                // Check user status for access
                const userStatus = (profile.status || 'onboarding').toLowerCase();
                if (!['member', 'verified_member', 'active'].includes(userStatus)) {
                    window.location.href = '/onboarding';
                    return;
                }

                // Inject sidebar
                window.injectClientSidebar('messages', '../logo.png');

                // Start auto-logout
                resetAutoLogout();

                // Track page view
                if (typeof window.trackActivity === 'function') {
                    window.trackActivity('page_view', '/portal/chat');
                }

                // Show chat wrapper
                document.getElementById('chatWrapper').style.display = '';

                // Load or create conversation
                await loadConversation();

            } catch (err) {
                console.error('Init error:', err);
                // Only redirect if it's truly an auth issue
                if (!currentUser) {
                    window.location.href = '/auth';
                }
            }
        })();

        // ============================================================
        // LOAD CONVERSATION
        // ============================================================
        async function loadConversation() {
            try {
                // Check for existing conversation
                const { data: convs, error: convError } = await window.supabaseClient
                    .from('chat_conversations')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .limit(1);

                if (convError) throw convError;

                if (convs && convs.length > 0) {
                    conversationId = convs[0].id;
                    conversationStatus = convs[0].status || 'open';

                    // Show resolved banner if applicable
                    if (conversationStatus === 'resolved') {
                        document.getElementById('resolvedBanner').style.display = '';
                    }

                    // Mark user unread as read (non-blocking, won't break page if RLS missing)
                    if (convs[0].user_unread_count > 0) {
                        window.supabaseClient
                            .from('chat_conversations')
                            .update({ user_unread_count: 0 })
                            .eq('id', conversationId)
                            .then(({ error: ue }) => { if (ue) console.warn('Could not mark as read:', ue.message); });
                    }

                    // Load messages
                    await loadMessages();

                    // Subscribe to realtime + polling fallback
                    subscribeToMessages();
                    startPolling();
                } else {
                    // No conversation yet - show start prompt
                    showStartState();
                }

            } catch (err) {
                console.error('Error loading conversation:', err);
                showErrorState();
            }
        }

        // ============================================================
        // LOAD MESSAGES
        // ============================================================
        async function loadMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('chat_messages')
                    .select(`
                        *,
                        sender:users!chat_messages_sender_id_fkey (
                            id,
                            first_name,
                            last_name,
                            email,
                            is_admin,
                            chat_display_name
                        )
                    `)
                    .eq('conversation_id', conversationId)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                renderMessages(data || []);
                if (data && data.length > 0) {
                    lastMessageTimestamp = data[data.length - 1].created_at;
                }

            } catch (err) {
                console.error('Error loading messages:', err);
                container.innerHTML = `
                    <div class="chat-empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
                        </svg>
                        <h3>Error Loading Messages</h3>
                        <p>Please try refreshing the page.</p>
                    </div>`;
            }
        }

        // ============================================================
        // RENDER MESSAGES
        // ============================================================
        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="chat-empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                        <h3>No Messages Yet</h3>
                        <p>Send a message to start the conversation with our team.</p>
                    </div>`;
                return;
            }

            let html = '';
            let lastDate = '';

            messages.forEach(msg => {
                const msgDate = new Date(msg.created_at).toLocaleDateString('en-US', {
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric'
                });

                if (msgDate !== lastDate) {
                    html += `<div class="msg-date-separator"><span>${msgDate}</span></div>`;
                    lastDate = msgDate;
                }

                const isMe = msg.sender_id === currentUser.id;
                const senderName = msg.display_name_override
                    || (msg.sender ? (msg.sender.chat_display_name || ((msg.sender.first_name || '') + ' ' + (msg.sender.last_name || '')).trim() || msg.sender.email) : null)
                    || (isMe ? 'You' : 'Team');
                const initialsSource = msg.display_name_override || (msg.sender ? (msg.sender.chat_display_name || ((msg.sender.first_name || '') + ' ' + (msg.sender.last_name || '')).trim()) : null);
                const initials = initialsSource
                    ? initialsSource.split(' ').map(n => n[0]).join('').substring(0, 2)
                    : (isMe ? 'Y' : 'T');
                const timeStr = new Date(msg.created_at).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                html += `
                    <div class="msg-row ${isMe ? 'me' : 'them'}" data-msg-id="${msg.id}">
                        <div class="msg-avatar">${(initials || '?').toUpperCase()}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${escapeHtml(msg.content || msg.message || '')}</div>
                            <div class="msg-meta">
                                <span class="msg-sender">${escapeHtml(isMe ? 'You' : senderName)}</span>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;

            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================================
        // SHOW START STATE (no conversation yet)
        // ============================================================
        function showStartState() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = `
                <div class="chat-empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <h3>Start a Conversation</h3>
                    <p>Have a question or need help? Send a message below and our team will get back to you.</p>
                </div>`;
        }

        // ============================================================
        // SHOW ERROR STATE
        // ============================================================
        function showErrorState() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = `
                <div class="chat-empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
                    </svg>
                    <h3>Something Went Wrong</h3>
                    <p>Please try refreshing the page.</p>
                </div>`;
        }

        // ============================================================
        // SUBSCRIBE TO REALTIME MESSAGES
        // ============================================================
        function subscribeToMessages() {
            if (!conversationId) return;

            messagesSubscription = window.supabaseClient
                .channel('client-chat-' + conversationId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'chat_messages',
                    filter: `conversation_id=eq.${conversationId}`
                }, (payload) => {
                    // Only append if it's not from us (avoid duplicates with sendMessage)
                    if (payload.new.sender_id !== currentUser.id) {
                        appendMessage(payload.new);
                    }
                    // Update timestamp for polling dedup
                    if (payload.new.created_at) {
                        lastMessageTimestamp = payload.new.created_at;
                    }
                })
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'chat_conversations',
                    filter: `id=eq.${conversationId}`
                }, (payload) => {
                    if (payload.new) {
                        conversationStatus = payload.new.status || 'open';
                        const banner = document.getElementById('resolvedBanner');
                        banner.style.display = conversationStatus === 'resolved' ? '' : 'none';

                        // Mark as read
                        if (payload.new.user_unread_count > 0) {
                            window.supabaseClient
                                .from('chat_conversations')
                                .update({ user_unread_count: 0 })
                                .eq('id', conversationId);
                        }
                    }
                })
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                });
        }

        // ============================================================
        // POLLING FALLBACK (every 12s, in case Realtime is not enabled)
        // ============================================================
        let pollingInterval = null;
        let lastMessageTimestamp = null;

        function startPolling() {
            pollingInterval = setInterval(async () => {
                if (!conversationId) return;
                try {
                    let query = window.supabaseClient
                        .from('chat_messages')
                        .select('*, sender:users!chat_messages_sender_id_fkey (id, first_name, last_name, email, is_admin, chat_display_name)')
                        .eq('conversation_id', conversationId)
                        .order('created_at', { ascending: false })
                        .limit(5);

                    if (lastMessageTimestamp) {
                        query = query.gt('created_at', lastMessageTimestamp);
                    }

                    const { data, error } = await query;
                    if (error) throw error;

                    if (data && data.length > 0) {
                        const newMsgs = data.reverse();
                        for (const msg of newMsgs) {
                            if (msg.sender_id === currentUser.id) continue;
                            // Simple dedup: check if msg ID already in DOM
                            if (document.querySelector(`[data-msg-id="${msg.id}"]`)) continue;
                            appendMessage(msg);
                        }
                        lastMessageTimestamp = newMsgs[newMsgs.length - 1].created_at;
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 12000);
        }

        // ============================================================
        // APPEND SINGLE MESSAGE (REALTIME)
        // ============================================================
        async function appendMessage(msg) {
            const container = document.getElementById('chatMessages');

            // Clear empty state if present
            if (container.querySelector('.chat-empty-state')) {
                container.innerHTML = '';
            }

            // Fetch sender info
            let sender = null;
            if (msg.sender_id) {
                const { data } = await window.supabaseClient
                    .from('users')
                    .select('id, first_name, last_name, email, is_admin, chat_display_name')
                    .eq('id', msg.sender_id)
                    .single();
                sender = data;
            }

            const isMe = msg.sender_id === currentUser.id;
            const senderName = msg.display_name_override
                || (sender ? (sender.chat_display_name || ((sender.first_name || '') + ' ' + (sender.last_name || '')).trim() || sender.email) : null)
                || (isMe ? 'You' : 'Team');
            const initialsSource = msg.display_name_override || (sender ? (sender.chat_display_name || ((sender.first_name || '') + ' ' + (sender.last_name || '')).trim()) : null);
            const initials = initialsSource
                ? initialsSource.split(' ').map(n => n[0]).join('').substring(0, 2)
                : (isMe ? 'Y' : 'T');
            const timeStr = new Date(msg.created_at).toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });

            const msgHtml = `
                <div class="msg-row ${isMe ? 'me' : 'them'}" data-msg-id="${msg.id}">
                    <div class="msg-avatar">${(initials || '?').toUpperCase()}</div>
                    <div class="msg-content">
                        <div class="msg-bubble">${escapeHtml(msg.content || msg.message || '')}</div>
                        <div class="msg-meta">
                            <span class="msg-sender">${escapeHtml(isMe ? 'You' : senderName)}</span>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    </div>
                </div>`;

            container.insertAdjacentHTML('beforeend', msgHtml);

            requestAnimationFrame(() => {
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnSend');
            const text = input.value.trim();

            if (!text || !currentUser) return;

            btn.disabled = true;
            input.disabled = true;

            try {
                // Create conversation if first message
                if (!conversationId) {
                    const { data: newConv, error: convError } = await window.supabaseClient
                        .from('chat_conversations')
                        .insert({
                            user_id: currentUser.id,
                            status: 'open',
                            last_message_at: new Date().toISOString(),
                            last_message_preview: text.substring(0, 100),
                            admin_unread_count: 1
                        })
                        .select()
                        .single();

                    if (convError) throw convError;

                    conversationId = newConv.id;
                    conversationStatus = 'open';

                    // Start subscription now
                    subscribeToMessages();
                    startPolling();
                }

                // If conversation was resolved, reopen it
                if (conversationStatus === 'resolved') {
                    await window.supabaseClient
                        .from('chat_conversations')
                        .update({
                            status: 'open',
                            resolved_at: null
                        })
                        .eq('id', conversationId);

                    conversationStatus = 'open';
                    document.getElementById('resolvedBanner').style.display = 'none';
                }

                // Insert message
                const { data: newMsg, error: msgError } = await window.supabaseClient
                    .from('chat_messages')
                    .insert({
                        conversation_id: conversationId,
                        sender_id: currentUser.id,
                        sender_type: 'customer',
                        content: text,
                        message: text
                    })
                    .select()
                    .single();

                if (msgError) throw msgError;

                // Update conversation metadata
                await window.supabaseClient
                    .from('chat_conversations')
                    .update({
                        last_message_at: new Date().toISOString(),
                        last_message_preview: text.substring(0, 100),
                        admin_unread_count: 1
                    })
                    .eq('id', conversationId);

                // Clear input
                input.value = '';
                input.style.height = 'auto';

                // Append message locally
                const container = document.getElementById('chatMessages');
                if (container.querySelector('.chat-empty-state')) {
                    container.innerHTML = '';
                }

                const myInitials = currentProfile
                    ? ((currentProfile.first_name || '')[0] || '') + ((currentProfile.last_name || '')[0] || '')
                    : 'Y';
                const timeStr = new Date().toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                const msgHtml = `
                    <div class="msg-row me">
                        <div class="msg-avatar">${(myInitials || 'Y').toUpperCase()}</div>
                        <div class="msg-content">
                            <div class="msg-bubble">${escapeHtml(text)}</div>
                            <div class="msg-meta">
                                <span class="msg-sender">You</span>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        </div>
                    </div>`;

                container.insertAdjacentHTML('beforeend', msgHtml);

                requestAnimationFrame(() => {
                    container.scrollTop = container.scrollHeight;
                });

            } catch (err) {
                console.error('Error sending message:', err);
                showToast('Failed to send message. Please try again.', 'error');
            } finally {
                input.disabled = false;
                input.focus();
                toggleSendBtn();
            }
        }

        // ============================================================
        // INPUT HELPERS
        // ============================================================
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResizeInput(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function toggleSendBtn() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('btnSend');
            btn.disabled = !input.value.trim();
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Cleanup on page leave
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
            if (messagesSubscription) {
                window.supabaseClient.removeChannel(messagesSubscription);
            }
        });
    </script>
</body>
</html>
